name: Bug Report
description: Report a bug in @n3rd-ai/ui
title: '[bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Import `Box` from `@n3rd-ai/ui`
        2. Pass `border="double"`
        3. See incorrect rendering
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which version of @n3rd-ai/ui are you using?
      placeholder: '0.1.0'
    validations:
      required: true

  - type: input
    id: next-version
    attributes:
      label: Next.js Version
      placeholder: '15.0.0'
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or code snippets.
