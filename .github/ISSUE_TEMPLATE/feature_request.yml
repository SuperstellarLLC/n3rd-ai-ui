name: Feature Request
description: Suggest a feature or new component for @n3rd-ai/ui
title: '[feat]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe what you'd like.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature or component you'd like.
      placeholder: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this would solve or the workflow it would improve.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API
      description: If you have ideas for the component API, share them here.
      placeholder: |
        ```tsx
        <Component prop="value" />
        ```

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
